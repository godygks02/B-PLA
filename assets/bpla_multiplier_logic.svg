<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#d8e3ea" stroke-width="1"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#222"/>
    </marker>
    <style>
      .bg { fill: #fbfdff; }
      .grid { fill: url(#grid); }
      .wire { fill: none; stroke: #222; stroke-width: 2.2; marker-end: url(#arrow); }
      .thin { fill: none; stroke: #222; stroke-width: 1.6; marker-end: url(#arrow); }
      .box { stroke: #222; stroke-width: 2; rx: 6; ry: 6; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 24px; font-weight: 700; fill: #111; text-anchor: middle; dominant-baseline: middle; }
      .small { font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: 700; fill: #111; text-anchor: middle; dominant-baseline: middle; }
      .tiny { font-family: Arial, Helvetica, sans-serif; font-size: 15px; font-weight: 700; fill: #111; text-anchor: middle; dominant-baseline: middle; }
      .area-label { font-family: Arial, Helvetica, sans-serif; font-size: 24px; font-weight: 800; fill: #111; text-anchor: middle; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="900"/>
  <rect class="grid" width="1600" height="900" opacity="0.82"/>

  <text x="800" y="52" class="area-label">B-PLA Multiplier</text>

  <!-- Inputs -->
  <g>
    <text x="390" y="93" class="small">FP A</text>
    <rect class="box" x="250" y="115" width="90" height="38" fill="#ffe7d6"/>
    <rect class="box" x="340" y="115" width="110" height="38" fill="#dff1d8"/>
    <rect class="box" x="450" y="115" width="210" height="38" fill="#d9eef9"/>
    <text x="295" y="135" class="small">Sign</text>
    <text x="395" y="135" class="small">Exp</text>
    <text x="555" y="135" class="small">Mant</text>
  </g>

  <g>
    <text x="1210" y="93" class="small">FP B</text>
    <rect class="box" x="940" y="115" width="90" height="38" fill="#ffe7d6"/>
    <rect class="box" x="1030" y="115" width="110" height="38" fill="#dff1d8"/>
    <rect class="box" x="1140" y="115" width="210" height="38" fill="#d9eef9"/>
    <text x="985" y="135" class="small">Sign</text>
    <text x="1085" y="135" class="small">Exp</text>
    <text x="1245" y="135" class="small">Mant</text>
  </g>

  <!-- Split -->
  <rect class="box" x="355" y="205" width="890" height="46" fill="#f7f7f7"/>
  <text x="800" y="229" class="label">FP Split</text>
  <path class="wire" d="M390 153 V205"/>
  <path class="wire" d="M1210 153 V205"/>

  <!-- Side logic -->
  <rect class="box" x="205" y="325" width="150" height="70" fill="#ffd9db"/>
  <text x="280" y="360" class="small">Sign XOR</text>

  <rect class="box" x="405" y="325" width="150" height="70" fill="#ffe4bf"/>
  <text x="480" y="360" class="small">Exp Add</text>

  <path class="wire" d="M585 251 H280 V325"/>
  <path class="wire" d="M1015 251 H320 V325"/>
  <path class="wire" d="M660 251 H480 V325"/>
  <path class="wire" d="M940 251 H520 V325"/>

  <!-- B-PLA mantissa area -->
  <rect x="595" y="290" width="770" height="380" fill="#fff4c7" stroke="#d1b957" stroke-width="2" opacity="0.76" rx="8"/>
  <text x="980" y="325" class="area-label">B-PLA Mantissa</text>

  <rect class="box" x="640" y="365" width="170" height="70" fill="#e6f1ff"/>
  <text x="725" y="400" class="small">Prefix</text>

  <rect class="box" x="640" y="485" width="170" height="115" fill="#e9f7e3"/>
  <text x="725" y="515" class="small">2D LUT</text>
  <g stroke="#222" stroke-width="1.5">
    <rect x="682" y="535" width="86" height="44" fill="#d5e8ef"/>
    <path d="M696 535 V579 M710 535 V579 M724 535 V579 M738 535 V579 M752 535 V579"/>
    <path d="M682 549 H768 M682 563 H768"/>
  </g>

  <rect x="870" y="365" width="400" height="235" fill="#d9f0dd" stroke="#6ca777" stroke-width="2" rx="8"/>
  <text x="1070" y="397" class="small">Shift-Add</text>

  <g>
    <rect class="box" x="910" y="430" width="62" height="50" fill="#ffffff"/>
    <rect class="box" x="996" y="430" width="62" height="50" fill="#ffffff"/>
    <rect class="box" x="1082" y="430" width="62" height="50" fill="#ffffff"/>
    <text x="941" y="455" class="tiny">Shift</text>
    <text x="1027" y="455" class="tiny">Shift</text>
    <text x="1113" y="455" class="tiny">Add</text>
    <path class="thin" d="M972 455 H996"/>
    <path class="thin" d="M1058 455 H1082"/>
  </g>

  <g>
    <rect class="box" x="910" y="520" width="62" height="50" fill="#ffffff"/>
    <rect class="box" x="996" y="520" width="62" height="50" fill="#ffffff"/>
    <rect class="box" x="1082" y="520" width="62" height="50" fill="#ffffff"/>
    <text x="941" y="545" class="tiny">Shift</text>
    <text x="1027" y="545" class="tiny">Shift</text>
    <text x="1113" y="545" class="tiny">Add</text>
    <path class="thin" d="M972 545 H996"/>
    <path class="thin" d="M1058 545 H1082"/>
  </g>

  <rect class="box" x="1185" y="475" width="115" height="75" fill="#ffffff"/>
  <text x="1242" y="512" class="small">Add Tree</text>

  <rect class="box" x="910" y="625" width="365" height="55" fill="#fff"/>
  <text x="1092" y="653" class="small">Mant Add</text>

  <path class="wire" d="M800 251 V365 H640"/>
  <path class="wire" d="M1120 251 V365 H810"/>
  <path class="wire" d="M725 435 V485"/>
  <path class="wire" d="M810 542 H870"/>
  <path class="wire" d="M1144 455 H1185"/>
  <path class="wire" d="M1144 545 H1185"/>
  <path class="wire" d="M1242 550 V625"/>
  <path class="wire" d="M735 251 V625 H910"/>
  <path class="wire" d="M1225 251 V625 H1275"/>

  <!-- Repack -->
  <rect x="480" y="720" width="640" height="92" fill="#eadcf4" stroke="#9e7cb3" stroke-width="2" opacity="0.88" rx="8"/>
  <text x="800" y="746" class="area-label">Repack</text>

  <rect class="box" x="530" y="762" width="155" height="42" fill="#ffffff"/>
  <text x="607" y="783" class="tiny">Norm</text>
  <rect class="box" x="725" y="762" width="155" height="42" fill="#ffffff"/>
  <text x="802" y="783" class="tiny">Round</text>
  <rect class="box" x="920" y="762" width="155" height="42" fill="#ffffff"/>
  <text x="997" y="783" class="tiny">Pack</text>
  <path class="wire" d="M685 783 H725"/>
  <path class="wire" d="M880 783 H920"/>

  <path class="wire" d="M280 395 V783 H530"/>
  <path class="wire" d="M480 395 V720"/>
  <path class="wire" d="M1092 680 V720"/>
  <path class="wire" d="M800 720 V762"/>

  <!-- Output -->
  <rect class="box" x="615" y="845" width="370" height="38" fill="#d9eef9"/>
  <text x="800" y="865" class="small">Approx FP Out</text>
  <path class="wire" d="M997 804 V845 H800"/>

  <!-- Multiplierless cue -->
  <g opacity="0.62">
    <rect class="box" x="1245" y="715" width="120" height="55" fill="#eeeeee" stroke-dasharray="7 5"/>
    <text x="1305" y="742" class="small">Mult</text>
    <path d="M1260 725 L1350 760 M1350 725 L1260 760" stroke="#c92a2a" stroke-width="5"/>
  </g>
</svg>
